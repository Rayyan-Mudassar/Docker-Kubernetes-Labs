name: notes-app

services:
  app:
    build: ./app
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_NAME=notesdb
      - DB_USER=admin
      - DB_PASSWORD=secret
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=notesdb
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
